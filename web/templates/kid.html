<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sl33p-space - {{ profile.name }}</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #141a2e;
      --border: #1e2744;
      --text: #c8d6f0;
      --accent: #6e40c9;
      --accent-glow: rgba(110, 64, 201, 0.3);
      --success: #3fb950;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      user-select: none;
      -webkit-user-select: none;
    }
    .greeting {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }
    .name {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2rem;
    }
    .status-bar {
      text-align: center;
      margin-bottom: 2rem;
      min-height: 3rem;
    }
    .status-playing {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-size: 1.1rem;
    }
    .dot {
      width: 12px; height: 12px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-idle { color: #556; font-size: 1.1rem; }

    .big-btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: var(--surface);
      color: #fff;
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 2rem;
      transition: all 0.2s;
      box-shadow: 0 0 30px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
    }
    .big-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px var(--accent-glow);
    }
    .big-btn:active { transform: scale(0.97); }
    .big-btn.playing {
      border-color: var(--success);
      box-shadow: 0 0 30px rgba(63, 185, 80, 0.3);
    }
    .big-btn .icon { font-size: 3rem; }
    .big-btn .label { font-size: 1.1rem; font-weight: 400; opacity: 0.8; }

    .sounds {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      max-width: 400px;
      width: 100%;
      margin-bottom: 2rem;
    }
    .sound-pick {
      padding: 1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .sound-pick:hover { border-color: var(--accent); }
    .sound-pick.selected {
      border-color: var(--accent);
      background: rgba(110, 64, 201, 0.15);
      color: #fff;
    }

    .timer {
      color: #556;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    .parent-link {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      color: #334;
      text-decoration: none;
      font-size: 0.75rem;
    }
    .parent-link:hover { color: #556; }
  </style>
</head>
<body>
  <div class="greeting" id="greeting"></div>
  <div class="name">{{ profile.name }}</div>

  <div class="status-bar" id="status-bar">
    <div class="status-idle">Pick a sound and press the button</div>
  </div>

  <button class="big-btn" id="main-btn" onclick="togglePlay()">
    <span class="icon" id="btn-icon">&#9790;</span>
    <span class="label" id="btn-label">Start Bedtime</span>
  </button>

  <div class="sounds">
    {% for sound in sounds %}
    <button class="sound-pick {% if sound == profile.preferred_sounds[0] %}selected{% endif %}"
            data-sound="{{ sound }}" onclick="pickSound(this, '{{ sound }}')">
      {{ sound | replace('_', ' ') | title }}
    </button>
    {% endfor %}
  </div>

  <div class="timer" id="timer"></div>
  <a href="/" class="parent-link">Parent Dashboard</a>

  <script>
    let selectedSound = '{{ profile.preferred_sounds[0] if profile.preferred_sounds else "brown_noise" }}';
    let isPlaying = false;
    const profileName = '{{ profile.name }}';
    const maxVol = {{ profile.max_volume }};
    const fadeMins = {{ profile.fade_minutes }};

    function setGreeting() {
      const h = new Date().getHours();
      document.getElementById('greeting').textContent =
        h < 12 ? 'Good morning,' : h < 17 ? 'Good afternoon,' : 'Good night,';
    }
    setGreeting();

    function pickSound(el, sound) {
      document.querySelectorAll('.sound-pick').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedSound = sound;
    }

    async function togglePlay() {
      const btn = document.getElementById('main-btn');
      if (isPlaying) {
        await fetch('/api/fade', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({target: 0, seconds: 60})
        });
        updateUI(false);
      } else {
        await fetch('/api/play', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({sound_type: selectedSound, duration_minutes: 30, volume: maxVol})
        });
        updateUI(true);
      }
    }

    function updateUI(playing) {
      isPlaying = playing;
      const btn = document.getElementById('main-btn');
      const icon = document.getElementById('btn-icon');
      const label = document.getElementById('btn-label');
      const status = document.getElementById('status-bar');
      if (playing) {
        btn.classList.add('playing');
        icon.innerHTML = '&#9724;';
        label.textContent = 'Stop';
        status.innerHTML = `<div class="status-playing"><span class="dot"></span>${selectedSound.replace(/_/g, ' ')}</div>`;
      } else {
        btn.classList.remove('playing');
        icon.innerHTML = '&#9790;';
        label.textContent = 'Start Bedtime';
        status.innerHTML = '<div class="status-idle">Pick a sound and press the button</div>';
      }
    }

    async function checkStatus() {
      const r = await fetch('/api/status');
      const s = await r.json();
      if (s.is_playing !== isPlaying) updateUI(s.is_playing);
    }
    setInterval(checkStatus, 5000);
  </script>
</body>
</html>
