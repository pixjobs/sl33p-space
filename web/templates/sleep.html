{% extends "base.html" %}
{% block title %}Sleep - sl33p-space{% endblock %}
{% block styles %}
<style>
/* ───── Sleep Display ───── */
.sleep-display {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* ───── Clock ───── */
.sleep-clock {
  font-size: 5rem;
  font-weight: 200;
  letter-spacing: 6px;
  color: rgba(255, 245, 230, 0.9);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 60px rgba(255, 183, 77, 0.1);
  font-family: 'Inter', monospace;
  margin-bottom: 0.5rem;
}

.sleep-clock-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255, 255, 255, 0.3);
  margin-bottom: 2rem;
}

/* ───── Info Gauges ───── */
.sleep-telemetry {
  display: flex;
  gap: 2.5rem;
  margin-bottom: 2rem;
}

.telemetry-gauge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
}

.gauge-ring {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.gauge-value {
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.7);
  font-variant-numeric: tabular-nums;
}

.gauge-label {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255, 255, 255, 0.3);
}

.status-readout {
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.35);
  letter-spacing: 0.5px;
  margin-bottom: 1.5rem;
}

/* ───── Waveform Visualiser ───── */
.viz-container {
  position: relative;
  width: 220px;
  height: 220px;
  margin-bottom: 1.5rem;
}
.viz-canvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}
.breath-text {
  position: absolute;
  bottom: -1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255, 220, 180, 0.25);
  font-weight: 500;
  white-space: nowrap;
}

@media (max-width: 640px) {
  .viz-container { width: 160px; height: 160px; }
}

/* ───── Timer Display ───── */
.sleep-timer {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.25);
}

.timer-icon { font-weight: 300; }
.timer-val {
  font-weight: 500;
  color: rgba(255, 255, 255, 0.4);
  font-variant-numeric: tabular-nums;
}

/* ───── Controls Bar ───── */
.sleep-controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  padding: 1rem 1.5rem 1.5rem;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.sleep-controls.hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}

.controls-inner {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  max-width: 700px;
  margin: 0 auto;
  flex-wrap: wrap;
  justify-content: center;
}

.ctrl-btn {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: 0.2s ease;
  font-family: inherit;
  font-size: 0.7rem;
  backdrop-filter: blur(8px);
}

.ctrl-btn svg { width: 16px; height: 16px; }

.ctrl-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.8);
  border-color: rgba(255, 255, 255, 0.18);
}

.ctrl-btn.active {
  background: rgba(255, 183, 77, 0.12);
  border-color: rgba(255, 183, 77, 0.3);
  color: rgba(255, 200, 120, 0.85);
}

.ctrl-btn-sm {
  width: auto;
  height: 30px;
  padding: 0 0.6rem;
  border-radius: 15px;
  font-size: 0.65rem;
  font-weight: 500;
}

.ctrl-end {
  width: auto;
  height: 38px;
  padding: 0 1.1rem;
  border-radius: 19px;
  font-size: 0.75rem;
  font-weight: 500;
  color: rgba(244, 63, 94, 0.7);
  border-color: rgba(244, 63, 94, 0.15);
  margin-left: auto;
}

.ctrl-end:hover {
  background: rgba(244, 63, 94, 0.12);
  color: rgba(244, 63, 94, 0.95);
  border-color: rgba(244, 63, 94, 0.35);
}

.ctrl-volume {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.ctrl-volume input[type="range"] {
  width: 70px;
  height: 3px;
}

.ctrl-timer-btns { display: flex; gap: 0.2rem; }

.ctrl-btn.autoplay-blocked {
  animation: pulse-play 1.5s ease-in-out infinite;
  background: rgba(124, 92, 252, 0.15);
  border-color: rgba(124, 92, 252, 0.4);
  color: rgba(124, 92, 252, 0.9);
}
@keyframes pulse-play {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(124,92,252,0.3); }
  50% { transform: scale(1.15); box-shadow: 0 0 20px 4px rgba(124,92,252,0.2); }
}

@media (max-width: 640px) {
  .sleep-clock { font-size: 3.5rem; letter-spacing: 3px; }
  .sleep-telemetry { gap: 1.5rem; }
  .gauge-ring { width: 52px; height: 52px; }
  .controls-inner { gap: 0.35rem; }
  .ctrl-btn { width: 34px; height: 34px; }
  .ctrl-volume input[type="range"] { width: 50px; }
  .ctrl-timer-btns { display: flex; overflow-x: auto; gap: 0.25rem; }
  .ctrl-btn-sm { min-height: 34px; min-width: 40px; font-size: 0.6rem; }
}
</style>
{% endblock %}

{% block content %}

<div class="immersive" id="immersive">
  <!-- Background layers (Ken Burns + APOD slideshow) -->
  <div class="imm-bg" id="imm-bg">
    <div class="imm-bg-image" id="imm-bg-image"></div>
    <div class="imm-bg-image-b" id="imm-bg-image-b"></div>
    <div class="imm-bg-overlay"></div>
  </div>

  <!-- Sleep Display -->
  <div class="sleep-display" id="sleep-display">
    <div class="sleep-clock" id="sleep-clock">00:00</div>
    <div class="sleep-clock-label"></div>

    <!-- Telemetry Gauges -->
    <div class="sleep-telemetry">
      <div class="telemetry-gauge">
        <div class="gauge-ring"><span class="gauge-value" id="tel-duration">0m</span></div>
        <span class="gauge-label">Elapsed</span>
      </div>
      <div class="telemetry-gauge">
        <div class="gauge-ring"><span class="gauge-value" id="tel-track">--</span></div>
        <span class="gauge-label">Track</span>
      </div>
      <div class="telemetry-gauge">
        <div class="gauge-ring"><span class="gauge-value" id="tel-status">●</span></div>
        <span class="gauge-label">Status</span>
      </div>
    </div>

    <!-- Status readout -->
    <div class="status-readout" id="status-readout">Soundscape active</div>

    <!-- Waveform Visualiser + Breathing -->
    <div class="viz-container" id="viz-container">
      <canvas class="viz-canvas" id="viz-canvas"></canvas>
      <div class="breath-text" id="breath-label">Breathe in</div>
    </div>

    <!-- Sleep Timer -->
    <div class="sleep-timer" id="sleep-timer" style="display:none">
      <span class="timer-icon">⏱</span>
      <span>Auto-end in</span>
      <span class="timer-val" id="timer-value">--</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="sleep-controls" id="sleep-controls">
    <div class="controls-inner">
      <button class="ctrl-btn" id="ctrl-prev" onclick="immSkipPrev()" title="Previous track" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><rect x="5" y="4" width="2" height="16"/></svg>
      </button>
      <button class="ctrl-btn" id="ctrl-play" onclick="immTogglePlay()" title="Play/Pause">
        <svg id="ctrl-play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" id="ctrl-next" onclick="immSkipNext()" title="Next track" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><rect x="17" y="4" width="2" height="16"/></svg>
      </button>
      <button class="ctrl-btn" id="ctrl-loop" onclick="immToggleLoop()" title="Loop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
      <div class="ctrl-volume">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:0.4"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <input type="range" id="imm-volume" min="0" max="100" value="70" oninput="immSetVolume(this.value)">
      </div>
      <div class="ctrl-timer-btns">
        <button class="ctrl-btn ctrl-btn-sm" onclick="immSetTimer(30)">30m</button>
        <button class="ctrl-btn ctrl-btn-sm" onclick="immSetTimer(60)">1h</button>
        <button class="ctrl-btn ctrl-btn-sm" onclick="immSetTimer(120)">2h</button>
        <button class="ctrl-btn ctrl-btn-sm" onclick="immSetTimer(480)" title="8 hours">8h</button>
        <button class="ctrl-btn ctrl-btn-sm" onclick="immSetTimer(600)" title="10 hours (max)">Max</button>
      </div>
      <button class="ctrl-btn ctrl-end" id="ctrl-end" onclick="immEndSleep()">End Sleep</button>
    </div>
  </div>

  <!-- Tap-to-start overlay (mobile autoplay blocked) -->
  <div id="tap-overlay" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;cursor:pointer" onclick="_dismissOverlay()">
    <div style="text-align:center;pointer-events:none">
      <div style="width:80px;height:80px;margin:0 auto 1rem;border-radius:50%;background:rgba(124,92,252,0.2);border:2px solid rgba(124,92,252,0.5);display:flex;align-items:center;justify-content:center;animation:pulse-play 1.5s ease-in-out infinite">
        <svg viewBox="0 0 24 24" fill="rgba(124,92,252,0.9)" style="width:36px;height:36px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:0.85rem;font-weight:500">Tap to start soundscape</div>
    </div>
  </div>

  <!-- Audio element (no loop — playlist handles progression) -->
  <audio id="imm-audio" preload="auto" playsinline></audio>

</div>

<script>
var _imm = {
  sessionId: '{{ session_id or "" }}',
  trackSrc: '{{ track_src or "" }}',
  trackTitle: '{{ track_title or "" }}',
  playlistId: '{{ playlist_id or "" }}' || null,
  playlist: [],
  playlistIndex: 0,
  singleTrackMode: false,
  timerMinutes: 0,
  timerEnd: null,
  timerInterval: null,
  hideTimeout: null,
  controlsVisible: true,
  breathTimer: null,
  started: false,
  apodImages: [],
  apodIndex: 0,
  apodInterval: null,
  apodLayerA: true,
  elapsedStart: null,
  elapsedInterval: null,
  sessionStart: null,
  _maxCutoffTriggered: false,
};

function updateSleepClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var el = document.getElementById('sleep-clock');
  if (el) el.textContent = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}
updateSleepClock();
setInterval(updateSleepClock, 1000);

// ───── Auto-Cutoff ─────
var _MAX_SESSION_MS = 10 * 60 * 60 * 1000; // 10 hours hard max
var _DEFAULT_TIMER_MIN = 480; // 8 hours default

// ───── Elapsed Timer ─────
function updateElapsed() {
  if (!_imm.elapsedStart) return;
  var elapsedMs = Date.now() - _imm.elapsedStart;
  var elapsed = Math.floor(elapsedMs / 60000);
  var el = document.getElementById('tel-duration');
  if (el) {
    if (elapsed < 60) el.textContent = elapsed + 'm';
    else el.textContent = Math.floor(elapsed / 60) + 'h ' + (elapsed % 60) + 'm';
  }
  if (elapsedMs >= _MAX_SESSION_MS && !_imm._maxCutoffTriggered) {
    _imm._maxCutoffTriggered = true;
    _setStatus('Max session reached — ending');
    fadeOutAudio();
  }
}

// ───── Audio Setup ─────
// Step 1: Queue (load src) → Step 2: Wait for canplay → Step 3: Play on gesture
var _audioReady = false;
var _needsGesture = false;

(function initAudio() {
  var audio = document.getElementById('imm-audio');
  if (!audio) return;

  audio.volume = 0.7;

  audio.addEventListener('play', function() {
    console.log('[audio] PLAYING', audio.src.slice(-50));
    updatePlayIcon(false);
    _audioReady = true;
    _needsGesture = false;
    if (!_imm.elapsedStart) _imm.elapsedStart = Date.now();
    if (!_imm.sessionStart) _imm.sessionStart = new Date();
    _hideOverlay();
    _updateMediaSession();
    _savePlaybackState();
  });

  audio.addEventListener('pause', function() { updatePlayIcon(true); });

  audio.addEventListener('error', function() {
    var code = audio.error ? audio.error.code : '?';
    var msg = audio.error ? audio.error.message : '';
    console.error('[audio] ERROR code=' + code, msg, audio.src.slice(-60));
    if (_queueTrack._timeout) {
      clearTimeout(_queueTrack._timeout);
      _queueTrack._timeout = null;
    }
    _audioReady = false;
    _setStatus('Audio error — try refreshing');
  });

  audio.addEventListener('ended', function() {
    console.log('[audio] track ended, singleTrackMode=' + _imm.singleTrackMode +
                ', playlist.length=' + _imm.playlist.length +
                ', playlistIndex=' + _imm.playlistIndex);
    // Single track mode uses audio.loop=true so ended shouldn't fire,
    // but handle it as a safety net
    if (_imm.singleTrackMode || _imm.playlist.length <= 1) {
      audio.currentTime = 0;
      audio.play().catch(function() {});
      return;
    }
    var prevIndex = _imm.playlistIndex;
    _imm.playlistIndex++;
    if (_imm.playlistIndex >= _imm.playlist.length) _imm.playlistIndex = 0;
    console.log('[audio] chaining: track ' + prevIndex + ' → ' + _imm.playlistIndex);
    _queueTrack(_imm.playlistIndex, true);
    _reportProgress();
  });
})();

function _setStatus(msg) {
  var el = document.getElementById('status-readout');
  if (el) el.textContent = msg;
  console.log('[status]', msg);
}

// Queue: set src and wait for canplay
function _queueTrack(index, autoplay) {
  var audio = document.getElementById('imm-audio');
  if (!audio) return;
  var track, src;

  if (_imm.playlist.length > 0) {
    track = _imm.playlist[index];
    if (!track) return;
    src = track.src || track.gcs_url || '';
  } else {
    src = _imm.trackSrc;
    track = { title: _imm.trackTitle };
  }

  if (!src) {
    console.error('[audio] no src for track', index);
    _setStatus('No audio available');
    return;
  }

  // Clear any previous timeout
  if (_queueTrack._timeout) {
    clearTimeout(_queueTrack._timeout);
    _queueTrack._timeout = null;
  }

  // Remove any stale canplay listeners from a previous queue call
  if (_queueTrack._pendingHandler) {
    audio.removeEventListener('canplay', _queueTrack._pendingHandler);
    _queueTrack._pendingHandler = null;
  }

  // In multi-track mode, disable native loop so ended event fires for chaining
  audio.loop = (_imm.singleTrackMode || _imm.playlist.length <= 1);

  console.log('[audio] QUEUE track', index, track.title || '', 'loop=' + audio.loop, src.slice(-50));
  _setStatus('Loading: ' + (track.title || 'track') + '...');
  _updateTrackDisplay(track, index);

  audio.src = src;
  audio.load();
  _audioReady = false;

  function onReady() {
    audio.removeEventListener('canplay', onReady);
    _queueTrack._pendingHandler = null;
    if (_queueTrack._timeout) {
      clearTimeout(_queueTrack._timeout);
      _queueTrack._timeout = null;
    }
    console.log('[audio] READY (canplay) track=' + index + ' title=' + (track.title || '?'));
    _audioReady = true;
    _setStatus((track.title || 'Track') + ' ready');

    if (autoplay) {
      _startPlayback();
    }
  }

  // One-shot listener: when browser has enough data to play
  _queueTrack._pendingHandler = onReady;
  audio.addEventListener('canplay', onReady);

  // If the browser already has this resource cached, readyState might already be high
  if (audio.readyState >= 3) {
    console.log('[audio] already ready (cached), readyState=' + audio.readyState);
    onReady();
  }

  // Timeout: if canplay doesn't fire in 15s, try playing anyway
  _queueTrack._timeout = setTimeout(function() {
    _queueTrack._timeout = null;
    if (!_audioReady) {
      console.warn('[audio] canplay timeout after 15s, readyState=' + audio.readyState + ', trying play anyway');
      if (audio.readyState >= 2) {
        onReady();
      } else {
        _setStatus('Slow connection — loading...');
        // Give it another 15s before giving up
        _queueTrack._timeout = setTimeout(function() {
          _queueTrack._timeout = null;
          if (!_audioReady) {
            console.error('[audio] giving up on track', index);
            _setStatus('Failed to load — skipping');
            // Skip to next track if available
            if (!_imm.singleTrackMode && _imm.playlist.length > 1) {
              _imm.playlistIndex++;
              if (_imm.playlistIndex >= _imm.playlist.length) _imm.playlistIndex = 0;
              _queueTrack(_imm.playlistIndex, true);
            }
          }
        }, 15000);
      }
    }
  }, 15000);
}

// Attempt play — if blocked, show overlay and capture next gesture
function _startPlayback() {
  var audio = document.getElementById('imm-audio');
  if (!audio || !audio.src) return;

  console.log('[audio] _startPlayback, readyState=' + audio.readyState);
  var p = audio.play();
  if (p) {
    p.then(function() {
      console.log('[audio] play() succeeded');
    }).catch(function(e) {
      console.warn('[audio] play() blocked:', e.name);
      _needsGesture = true;
      _showOverlay();
      _setStatus('Tap anywhere to start');
    });
  }
}

function _showOverlay() {
  var overlay = document.getElementById('tap-overlay');
  if (overlay) overlay.style.display = 'flex';
  var btn = document.getElementById('ctrl-play');
  if (btn) btn.classList.add('autoplay-blocked');
}

function _hideOverlay() {
  var overlay = document.getElementById('tap-overlay');
  if (overlay) overlay.style.display = 'none';
  var btn = document.getElementById('ctrl-play');
  if (btn) btn.classList.remove('autoplay-blocked');
}

// Global gesture handler — captures first touch/click to unlock audio
function _onFirstGesture() {
  if (!_needsGesture) return;
  console.log('[audio] gesture captured, starting playback');
  _needsGesture = false;
  _hideOverlay();
  var audio = document.getElementById('imm-audio');
  if (audio && audio.paused) {
    audio.play().then(function() {
      console.log('[audio] gesture play succeeded');
    }).catch(function(e) {
      console.warn('[audio] gesture play failed:', e.name);
    });
  }
}

function _updateTrackDisplay(track, index) {
  var telTrack = document.getElementById('tel-track');
  var total = _imm.playlist.length || 1;
  if (telTrack) telTrack.textContent = total > 1 ? (index + 1) + '/' + total : (track.title || '--').substring(0, 3).toUpperCase();
  var statusEl = document.getElementById('status-readout');
  if (statusEl && total > 1) {
    var role = track.role || '';
    var roleLabel = role === 'settling' ? 'Settling in' : role === 'transition' ? 'Transitioning' : 'Deep sleep';
    statusEl.textContent = roleLabel + ' — ' + (track.title || 'Track ' + (index + 1));
  }
}

function _reportProgress() {
  if (!_imm.playlistId) return;
  var played = _imm.playlistIndex + 1;
  api('/api/playlist/' + _imm.playlistId + '/progress', 'POST', { tracks_played: played }).catch(function() {});
}

function _updateMediaSession() {
  if (!('mediaSession' in navigator)) return;
  var title = 'sl33p-space';
  var artist = 'Sleep Soundscape';
  if (_imm.playlist.length > 0) {
    var track = _imm.playlist[_imm.playlistIndex];
    if (track) { title = track.title || 'Untitled'; artist = (track.role || 'ambient').replace('_', ' '); }
  } else if (_imm.trackTitle) {
    title = _imm.trackTitle;
  }
  navigator.mediaSession.metadata = new MediaMetadata({ title: title, artist: artist, album: 'sl33p-space' });
  navigator.mediaSession.setActionHandler('play', function() { immTogglePlay(); });
  navigator.mediaSession.setActionHandler('pause', function() { immTogglePlay(); });
  navigator.mediaSession.setActionHandler('previoustrack', function() { immSkipPrev(); });
  navigator.mediaSession.setActionHandler('nexttrack', function() { immSkipNext(); });
}

function immSkipNext() {
  if (_imm.singleTrackMode || _imm.playlist.length <= 1) return;
  _imm.playlistIndex++;
  if (_imm.playlistIndex >= _imm.playlist.length) _imm.playlistIndex = 0;
  _queueTrack(_imm.playlistIndex, true);
  _reportProgress();
}

function immSkipPrev() {
  if (_imm.singleTrackMode || _imm.playlist.length <= 1) return;
  var audio = document.getElementById('imm-audio');
  if (audio && audio.currentTime > 5) {
    audio.currentTime = 0;
    return;
  }
  _imm.playlistIndex--;
  if (_imm.playlistIndex < 0) _imm.playlistIndex = _imm.playlist.length - 1;
  _queueTrack(_imm.playlistIndex, true);
}

function _dismissOverlay() {
  _onFirstGesture();
}

async function initPlaylist() {
  var audio = document.getElementById('imm-audio');
  if (!audio) return;

  console.log('[playlist] init — playlistId:', _imm.playlistId, 'trackSrc:', _imm.trackSrc ? _imm.trackSrc.slice(-40) : 'none');
  _setStatus('Loading playlist...');

  if (_imm.playlistId) {
    try {
      var data = await api('/api/playlist/' + _imm.playlistId);
      if (data && data.tracks && data.tracks.length > 0) {
        console.log('[playlist] loaded', data.tracks.length, 'tracks');
        _imm.playlist = data.tracks;
        _imm.playlistIndex = 0;
        _imm.singleTrackMode = false;
        _queueTrack(0, true);
        return;
      }
      console.warn('[playlist] API returned empty tracks');
    } catch (e) {
      console.error('[playlist] API error:', e);
    }
  }

  // Fallback: single track mode
  _imm.singleTrackMode = true;
  if (_imm.trackSrc) {
    _queueTrack(0, true);
  } else {
    _setStatus('No tracks available');
  }
}

function updatePlayIcon(paused) {
  var icon = document.getElementById('ctrl-play-icon');
  if (!icon) return;
  while (icon.firstChild) icon.removeChild(icon.firstChild);

  if (paused) {
    var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '5 3 19 12 5 21 5 3');
    icon.appendChild(poly);
  } else {
    var r1 = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r1.setAttribute('x', '6'); r1.setAttribute('y', '4');
    r1.setAttribute('width', '4'); r1.setAttribute('height', '16');
    var r2 = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r2.setAttribute('x', '14'); r2.setAttribute('y', '4');
    r2.setAttribute('width', '4'); r2.setAttribute('height', '16');
    icon.appendChild(r1);
    icon.appendChild(r2);
  }
}

function immTogglePlay() {
  var audio = document.getElementById('imm-audio');
  if (!audio) return;
  _hideOverlay();
  _needsGesture = false;
  if (audio.paused) {
    audio.play().catch(function(e) {
      console.warn('[audio] toggle play failed:', e.name);
    });
  } else {
    audio.pause();
  }
}

function immToggleLoop() {
  var audio = document.getElementById('imm-audio');
  if (!audio) return;
  // Don't allow loop toggle in multi-track mode (chaining handles repeating)
  if (!_imm.singleTrackMode && _imm.playlist.length > 1) return;
  audio.loop = !audio.loop;
  var btn = document.getElementById('ctrl-loop');
  if (btn) btn.classList.toggle('active', audio.loop);
}

function immSetVolume(val) {
  var audio = document.getElementById('imm-audio');

}

// ───── APOD Slideshow ─────
function stopApodSlideshow() {
  if (_imm.apodInterval) { clearInterval(_imm.apodInterval); _imm.apodInterval = null; }
  var a = document.getElementById('imm-bg-image');
  var b = document.getElementById('imm-bg-image-b');
  if (a) { a.style.backgroundImage = ''; a.classList.remove('kb-active'); a.style.opacity = ''; }
  if (b) { b.style.backgroundImage = ''; b.classList.remove('kb-active'); b.style.opacity = '0'; }
}

var _apodFallbacks = [
  { url: 'https://apod.nasa.gov/apod/image/2401/PillsofCreation_Webb_960.jpg', title: 'Pillars of Creation' },
  { url: 'https://apod.nasa.gov/apod/image/2304/Carina_Webb_960.jpg', title: 'Carina Nebula' },
  { url: 'https://apod.nasa.gov/apod/image/2207/STScI-UDF_960.jpg', title: 'Hubble Deep Field' },
  { url: 'https://apod.nasa.gov/apod/image/2301/OrionNebula_Webb_960.jpg', title: 'Orion Nebula' }
];

function apodSlideshow() {
  if (_imm.apodImages.length === 0) return;

  var layerA = document.getElementById('imm-bg-image');
  var layerB = document.getElementById('imm-bg-image-b');
  if (!layerA || !layerB) return;

  function showImage(url, isLayerA) {
    console.log('[slideshow] showing:', url.slice(-40), isLayerA ? 'A' : 'B');
    if (isLayerA) {
      layerA.style.backgroundImage = 'url(' + url + ')';
      layerA.classList.add('kb-active');
      layerA.style.opacity = '1';
      layerB.style.opacity = '0';
    } else {
      layerB.style.backgroundImage = 'url(' + url + ')';
      layerB.classList.add('kb-active');
      layerB.style.opacity = '1';
      layerA.style.opacity = '0';
    }
  }

  var first = _imm.apodImages[0];
  showImage(first.url, true);
  _imm.apodIndex = 0;
  _imm.apodLayerA = true;

  function preloadNext() {
    var nextIdx = (_imm.apodIndex + 1) % _imm.apodImages.length;
    var img = new Image();
    img.src = _imm.apodImages[nextIdx].url;
  }
  preloadNext();

  _imm.apodInterval = setInterval(function() {
    _imm.apodIndex = (_imm.apodIndex + 1) % _imm.apodImages.length;
    _imm.apodLayerA = !_imm.apodLayerA;
    showImage(_imm.apodImages[_imm.apodIndex].url, _imm.apodLayerA);
    preloadNext();
  }, 30000);
}

async function loadApodBackground() {
  try {
    var data = await api('/api/scenes/cosmos');
    if (data && data.images && data.images.length > 0) {
      _imm.apodImages = data.images;
      console.log('[slideshow] loaded', data.images.length, 'APOD images');
    } else {
      _imm.apodImages = _apodFallbacks;
      console.log('[slideshow] using fallback images');
    }
  } catch (e) {
    _imm.apodImages = _apodFallbacks;
    console.log('[slideshow] API error, using fallbacks');
  }
  apodSlideshow();
}

// ───── Waveform Visualiser + Breathing ─────
// NOTE: No createMediaElementSource — that hijacks the <audio> element
// through the AudioContext, which suspends on screen lock and kills playback.
// The visualizer uses breathing animation only (no FFT data needed).
var _viz = {
  ctx: null, canvas: null,
  animId: null,
  breathPhase: 0, breathT: 0, hueOffset: 0,
};

function initVisualiser() {
  var canvas = document.getElementById('viz-canvas');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  _viz.canvas = canvas;
  _viz.ctx = canvas.getContext('2d');
  _viz.ctx.scale(dpr, dpr);
  _viz.w = rect.width;
  _viz.h = rect.height;
}

function connectAudioAnalyser() {
  // Intentionally no-op — we don't connect to AudioContext so that
  // the <audio> element stays under the OS media layer and survives
  // screen lock, background tabs, and power button presses.
}

function startVisualiser() {
  initVisualiser();
  if (_viz.animId) return;
  var lastTime = 0;

  function draw(timestamp) {
    _viz.animId = requestAnimationFrame(draw);
    var dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.016;

    var ctx = _viz.ctx;
    var w = _viz.w;
    var h = _viz.h;
    var cx = w / 2;
    var cy = h / 2;
    var baseR = Math.min(cx, cy) * 0.35;

    ctx.clearRect(0, 0, w, h);

    // Breathing cycle: 4s in, 7s hold, 8s out = 19s total
    _viz.breathT += dt;
    var cycleT = _viz.breathT % 19;
    var breathScale, label;
    if (cycleT < 4) {
      breathScale = 1 + 0.6 * (cycleT / 4);
      label = 'Breathe in';
      _viz.breathPhase = 0;
    } else if (cycleT < 11) {
      breathScale = 1.6;
      label = 'Hold';
      _viz.breathPhase = 1;
    } else {
      breathScale = 1.6 - 0.6 * ((cycleT - 11) / 8);
      label = 'Breathe out';
      _viz.breathPhase = 2;
    }
    var el = document.getElementById('breath-label');
    if (el) el.textContent = label;

    _viz.hueOffset += dt * 12;
    var hue1 = (_viz.hueOffset) % 360;
    var hue2 = (hue1 + 60) % 360;
    var hue3 = (hue1 + 180) % 360;

    // Audio-reactive amplitude from the playing audio element
    var audio = document.getElementById('imm-audio');
    var isPlaying = audio && !audio.paused;

    var rings = 3;
    for (var ring = 0; ring < rings; ring++) {
      var ringR = baseR * breathScale * (0.7 + ring * 0.35);
      var alpha = 0.5 - ring * 0.12;
      var hue = [hue1, hue2, hue3][ring];
      var slices = 128;

      ctx.beginPath();
      for (var i = 0; i <= slices; i++) {
        var angle = (i / slices) * Math.PI * 2 - Math.PI / 2;
        var wave = Math.sin(timestamp * 0.001 + i * 0.15 + ring * 2) * 0.15;
        // Add subtle movement when audio is playing
        var playBoost = isPlaying ? Math.sin(timestamp * 0.002 + i * 0.3 + ring) * 0.08 : 0;
        var r = ringR + ringR * (wave + playBoost) * (0.6 + ring * 0.15);
        var x = cx + Math.cos(angle) * r;
        var y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'hsla(' + hue + ', 70%, 65%, ' + alpha + ')';
      ctx.lineWidth = 1.5 - ring * 0.3;
      ctx.shadowColor = 'hsla(' + hue + ', 80%, 55%, ' + (alpha * 0.6) + ')';
      ctx.shadowBlur = 12 + ring * 4;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Centre glow orb
    var orbR = baseR * 0.3 * breathScale;
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbR);
    grad.addColorStop(0, 'hsla(' + hue1 + ', 60%, 70%, 0.15)');
    grad.addColorStop(0.6, 'hsla(' + hue2 + ', 50%, 50%, 0.05)');
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(cx, cy, orbR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  _viz.animId = requestAnimationFrame(draw);
}

function startBreathing() {
  startVisualiser();
}

function stopBreathing() {
  if (_viz.animId) {
    cancelAnimationFrame(_viz.animId);
    _viz.animId = null;
  }
  if (_imm.breathTimer) {
    clearTimeout(_imm.breathTimer);
    _imm.breathTimer = null;
  }
}

// ───── Sleep Timer ─────
function immSetTimer(minutes) {
  var timerEl = document.getElementById('sleep-timer');
  if (_imm.timerInterval) clearInterval(_imm.timerInterval);

  if (minutes <= 0) {
    _imm.timerMinutes = 0;
    _imm.timerEnd = null;
    if (timerEl) timerEl.style.display = 'none';
    return;
  }

  _imm.timerMinutes = minutes;
  _imm.timerEnd = Date.now() + minutes * 60 * 1000;
  if (timerEl) timerEl.style.display = '';

  _imm.timerInterval = setInterval(function() {
    var remaining = Math.max(0, _imm.timerEnd - Date.now());
    var valEl = document.getElementById('timer-value');
    if (remaining <= 0) {
      clearInterval(_imm.timerInterval);
      if (valEl) valEl.textContent = '0:00';
      fadeOutAudio();
      return;
    }
    var mins = Math.floor(remaining / 60000);
    var secs = Math.floor((remaining % 60000) / 1000);
    if (valEl) {
      var h = Math.floor(mins / 60);
      var m = mins % 60;
      if (h > 0) {
        valEl.textContent = h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
      } else {
        valEl.textContent = m + ':' + (secs < 10 ? '0' : '') + secs;
      }
    }
  }, 1000);
}

function fadeOutAudio() {
  var audio = document.getElementById('imm-audio');
  if (!audio || audio.paused) return;
  var vol = audio.volume;
  var step = vol / 60;
  var fadeInterval = setInterval(function() {
    vol -= step;
    if (vol <= 0.01) {
      audio.pause();
      audio.volume = 0.7;
      clearInterval(fadeInterval);
      stopApodSlideshow();
      endSessionOnServer();
      if (_imm.sessionId) window.location.href = '/plan';
    } else {
      audio.volume = vol;
    }
  }, 1000);
}

// ───── Session Lifecycle ─────
function startSession() {
  if (!_imm.sessionId) return;
  _imm.started = true;
  api('/api/sleep/start', 'POST', {
    session_id: _imm.sessionId,
    track: _imm.trackSrc
  }).catch(function() {});
}

function endSessionOnServer() {
  if (!_imm.sessionId) return;
  api('/api/sleep/end', 'POST', { session_id: _imm.sessionId }).catch(function() {});
}

function immEndSleep() {
  var audio = document.getElementById('imm-audio');
  if (audio) audio.pause();
  if (_imm.timerInterval) clearInterval(_imm.timerInterval);
  stopBreathing();
  stopApodSlideshow();
  releaseWakeLock();
  try { sessionStorage.removeItem('sl33p_state'); } catch(e) {}

  if (_imm.elapsedInterval) clearInterval(_imm.elapsedInterval);

  if (_imm.playlistId) {
    _reportProgress();
  }

  if (_imm.sessionId) {
    endSessionOnServer();
    window.location.href = '/plan';
  } else {
    window.location.href = '/plan';
  }
}

// ───── Auto-hide Controls ─────
function showControls() {
  var controls = document.getElementById('sleep-controls');
  if (controls) controls.classList.remove('hidden');
  _imm.controlsVisible = true;
  resetHideTimer();
}

function hideControls() {
  var controls = document.getElementById('sleep-controls');
  if (controls) controls.classList.add('hidden');
  _imm.controlsVisible = false;
}

function resetHideTimer() {
  if (_imm.hideTimeout) clearTimeout(_imm.hideTimeout);
  _imm.hideTimeout = setTimeout(hideControls, 5000);
}

// ───── Wake Lock (prevent screen dimming) ─────
var _wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
    console.log('[wakelock] acquired');
    _wakeLock.addEventListener('release', function() {
      console.log('[wakelock] released');
      _wakeLock = null;
    });
  } catch (e) {
    console.warn('[wakelock] failed:', e.message);
  }
}

function releaseWakeLock() {
  if (_wakeLock) {
    _wakeLock.release();
    _wakeLock = null;
  }
}

// Re-acquire wake lock when page becomes visible again (after screen unlock)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    var audio = document.getElementById('imm-audio');
    if (audio && !audio.paused) requestWakeLock();
  }
});

// ───── Session Resume (survive refresh) ─────
function _savePlaybackState() {
  try {
    sessionStorage.setItem('sl33p_state', JSON.stringify({
      sessionId: _imm.sessionId,
      playlistId: _imm.playlistId,
      trackIndex: _imm.playlistIndex,
      trackSrc: _imm.trackSrc,
      trackTitle: _imm.trackTitle,
      elapsedStart: _imm.elapsedStart,
      ts: Date.now()
    }));
  } catch(e) {}
}

function _restorePlaybackState() {
  try {
    var raw = sessionStorage.getItem('sl33p_state');
    if (!raw) return null;
    var state = JSON.parse(raw);
    // Only restore if same session and less than 12 hours old
    if (state.sessionId !== _imm.sessionId) return null;
    if (Date.now() - state.ts > 12 * 60 * 60 * 1000) return null;
    return state;
  } catch(e) { return null; }
}
</script>

{% block scripts %}
<script>
// Runs after app.js is loaded — api() is available here
startBreathing();
loadApodBackground();
startSession();

// Restore previous state if refreshed mid-session
var _restored = _restorePlaybackState();
if (_restored && _restored.elapsedStart) {
  _imm.elapsedStart = _restored.elapsedStart;
  updateElapsed();
}

initPlaylist().then(function() {
  var audio = document.getElementById('imm-audio');
  if (!_imm.singleTrackMode && _imm.playlist.length > 1) {
    document.getElementById('ctrl-prev').style.display = '';
    document.getElementById('ctrl-next').style.display = '';
    document.getElementById('ctrl-loop').style.display = 'none';
    if (audio) audio.loop = false;
    console.log('[playlist] multi-track mode:', _imm.playlist.length, 'tracks, loop=false');
    if (_restored && _restored.trackIndex > 0 && _restored.trackIndex < _imm.playlist.length) {
      _imm.playlistIndex = _restored.trackIndex;
      _queueTrack(_restored.trackIndex, true);
    }
  } else {
    if (audio) audio.loop = true;
    document.getElementById('ctrl-loop').classList.add('active');
    console.log('[playlist] single-track/loop mode, loop=true');
  }
  requestWakeLock();
  if (!_imm.timerEnd) immSetTimer(_DEFAULT_TIMER_MIN);
});

// Save playback state periodically
setInterval(_savePlaybackState, 10000);

// Elapsed timer updates every 30s
setInterval(updateElapsed, 30000);

// Gesture capture — unlocks audio on mobile
document.addEventListener('click', _onFirstGesture, { once: false });
document.addEventListener('touchend', _onFirstGesture, { once: false });

document.addEventListener('mousemove', showControls);
document.addEventListener('touchstart', showControls);
resetHideTimer();

window.addEventListener('beforeunload', function() {
  _savePlaybackState();
  releaseWakeLock();
  if (_imm.sessionId && _imm.started) {
    var data = JSON.stringify({ session_id: _imm.sessionId });
    navigator.sendBeacon('/api/sleep/end', new Blob([data], { type: 'application/json' }));
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    immTogglePlay();
  } else if (e.key === 'Escape') {
    immEndSleep();
  } else if (e.key === 'ArrowRight') {
    immSkipNext();
  } else if (e.key === 'ArrowLeft') {
    immSkipPrev();
  }
});
</script>
