<details class="bg-surface border border-border rounded-2xl overflow-hidden">
  <summary class="flex items-center gap-2.5 text-[0.8rem] text-white/35 cursor-pointer py-3.5 px-5 hover:text-white/55 transition-colors">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-4 h-4 opacity-40"><path d="M9 18V5l12-2v13M6 18a3 3 0 100-6 3 3 0 000 6zM18 16a3 3 0 100-6 3 3 0 000 6z"/></svg>
    Sound Lab
  </summary>
  <div class="px-5 pb-5 relative">
    <textarea class="w-full px-3.5 py-2.5 bg-black/20 border border-border rounded-lg text-white text-sm resize-y min-h-[50px] focus:outline-none focus:border-brand placeholder:text-white/30" id="lab-prompt" placeholder="Describe the sound... e.g. warm analog pads, gentle rain, deep space drone"></textarea>
    <div class="flex gap-2 mt-2">
      <button class="btn btn-primary" id="btn-generate" onclick="generateTrack()">Generate</button>
      <button class="btn btn-ghost" id="btn-inspire" onclick="inspireMe()">Inspire me</button>
    </div>
    <div id="suggest-grid" class="mt-2"></div>
    <div id="preset-grid" class="mt-2">
      {% for name, prompt in presets.items() %}
      <button class="preset-btn" data-name="{{ name }}" data-prompt="{{ prompt }}" onclick="generateFromPreset(this.dataset.name, this.dataset.prompt)">{{ name }}</button>
      {% endfor %}
    </div>
    <div class="loading-overlay" id="gen-loading">
      <div class="spinner"></div>
      <span>Generating...</span>
    </div>
  </div>
</details>
